<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <!-- ===== FUNNEL STEP GUARD (DEVE VIR ANTES DE TUDO) =====
         roleta = step 3. Se o usuário já passou por /loja (step 4) e voltou,
         redireciona IMEDIATAMENTE pra /back2 sem renderizar nada. -->
    <script>
        (function () {
            try {
                var step = parseInt(localStorage.getItem('shopeeFunnelStep') || '0', 10);
                if (step > 3) {
                    var qs = window.location.search || '';
                    window.location.replace('/back2/' + qs);
                    return;
                }
                if (3 > step) localStorage.setItem('shopeeFunnelStep', '3');
            } catch (e) { }
        })();
    </script>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="theme-color" content="#EE4D2D">
    <title>🎰 Gire a Roleta — Shopee Oficial</title>
    <link rel="icon" href="images/favicon.png">

    <script src="js/confetti.browser.min.js" defer=""></script>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin="">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@500;600;700;800;900&display=swap" rel="stylesheet">

    <style>
        :root {
            --shopee: #EE4D2D;
            --shopee-dark: #D7401C;
            --shopee-light: #FF6B35;
            --gold: #FFC93C;
            --gold-dark: #F5B400;
            --text: #1F2937;
            --text-muted: #6B7280;
            --success: #16A34A;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            -webkit-tap-highlight-color: transparent;
        }

        html,
        body {
            min-height: 100%;
            max-width: 100%;
            overflow-x: hidden;
            overscroll-behavior-x: none;
        }

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(165deg, #FF8533 0%, #EE4D2D 60%, #C9381C 100%);
            color: var(--text);
            min-height: 100vh;
            padding: 16px 14px 100px;
            position: relative;
            width: 100%;
        }

        body::before,
        body::after {
            content: '';
            position: absolute;
            border-radius: 50%;
            pointer-events: none;
            z-index: 0;
        }

        body::before {
            width: 280px;
            height: 280px;
            top: -90px;
            right: -90px;
            background: radial-gradient(circle, rgba(255, 201, 60, .35) 0%, transparent 70%);
        }

        body::after {
            width: 340px;
            height: 340px;
            bottom: -120px;
            left: -120px;
            background: radial-gradient(circle, rgba(255, 255, 255, .15) 0%, transparent 70%);
        }

        .wrap {
            position: relative;
            z-index: 1;
            max-width: 460px;
            overflow-x: clip;
            margin: 0 auto;
            display: flex;
            flex-direction: column;
            gap: 18px;
        }

        /* ===== HEADER ===== */
        .header {
            display: flex;
            justify-content: center;
            padding: 6px 0 0;
        }

        .header img {
            height: 38px;
            filter: brightness(0) invert(1) drop-shadow(0 2px 6px rgba(0, 0, 0, .18));
        }

        /* ===== HEADLINE ===== */
        .title {
            text-align: center;
            color: #fff;
            font-weight: 900;
            font-size: clamp(24px, 7vw, 32px);
            line-height: 1.1;
            text-shadow: 0 3px 10px rgba(0, 0, 0, .18);
        }

        .title .accent {
            background: linear-gradient(90deg, #FFE082, #FFC93C);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            -webkit-text-fill-color: transparent;
        }

        .subtitle {
            text-align: center;
            color: #fff;
            font-weight: 600;
            font-size: 15px;
            opacity: .95;
            margin-top: -8px;
        }

        /* ===== ROLETA ===== */
        .roulette {
            position: relative;
            width: min(92vw, 360px);
            aspect-ratio: 1 / 1;
            margin: 8px auto 4px;
        }

        /* Brilho atrás */
        .roulette::before {
            content: '';
            position: absolute;
            inset: -10%;
            border-radius: 50%;
            background: radial-gradient(circle, rgba(255, 201, 60, .5) 0%, transparent 60%);
            filter: blur(22px);
            animation: glow 2.6s ease-in-out infinite;
            z-index: 0;
        }

        /* Imagem giratória — ocupa todo o espaço, sem espaço branco intermediário */
        .roulette-disk {
            position: absolute;
            inset: 0;
            border-radius: 50%;
            overflow: hidden;
            z-index: 2;
            transform: rotate(0deg);
            box-shadow:
                0 20px 50px -10px rgba(0, 0, 0, .45),
                0 0 0 6px #FFC93C,
                0 0 0 8px rgba(0, 0, 0, .15),
                inset 0 0 0 4px rgba(255, 255, 255, .25);
        }

        .roulette-disk img {
            width: 100%;
            height: 100%;
            object-fit: contain;
            border-radius: 50%;
            display: block;
        }

        .roulette-disk.spinning-win {
            animation: spinWin 5.5s cubic-bezier(0.17, 0.67, 0.32, 1.01) forwards;
        }

        /* Layout das 7 fatias (centro de cada uma, sentido horário a partir do topo):
             0°    → 5%      (vermelho)
             51°   → TENTE OUTRA VEZ #1
             103°  → 95%     (amarelo)
             154°  → 75%     (rosa)
             206°  → 50%     (verde água)
             257°  → TENTE OUTRA VEZ #2
             309°  → 25%     (azul)
           Ponteiro fixo em 12h (0°). Para alinhar a fatia X com o ponteiro:
           rotação final = (360 - X) mod 360 + n*360. */
        @keyframes spinWin {

            /* Para no "95%" (103°) → rotacionar até 257° + 5 voltas */
            0% {
                transform: rotate(0deg);
            }

            100% {
                transform: rotate(1954deg);
            }
        }

        /* Ponteiro no topo (12h) */
        .pointer {
            position: absolute;
            top: -16px;
            left: 50%;
            transform: translateX(-50%);
            width: 38px;
            height: 52px;
            z-index: 5;
            filter: drop-shadow(0 5px 10px rgba(0, 0, 0, .45));
        }

        .pointer svg {
            width: 100%;
            height: 100%;
            display: block;
        }

        /* Centro / pino central */
        .roulette-center {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 58px;
            height: 58px;
            border-radius: 50%;
            background: linear-gradient(135deg, #fff, #F3F4F6);
            box-shadow:
                0 6px 14px rgba(0, 0, 0, .35),
                inset 0 2px 4px rgba(255, 255, 255, .8),
                inset 0 -2px 4px rgba(0, 0, 0, .1),
                0 0 0 3px #FFC93C;
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 4;
            font-size: 22px;
        }

        /* ===== BOTÃO GIRAR ===== */
        .spin-btn {
            width: 100%;
            border: 0;
            background: linear-gradient(90deg, #FFC93C 0%, #FFB100 50%, #FFC93C 100%);
            background-size: 200% 100%;
            color: #1F2937;
            font-family: inherit;
            font-weight: 900;
            font-size: clamp(18px, 5vw, 22px);
            letter-spacing: .5px;
            text-transform: uppercase;
            padding: 18px 20px;
            border-radius: 18px;
            cursor: pointer;
            box-shadow:
                0 12px 28px rgba(0, 0, 0, .28),
                inset 0 -3px 0 rgba(0, 0, 0, .12),
                inset 0 2px 0 rgba(255, 255, 255, .4);
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            position: relative;
            overflow: hidden;
            transition: transform .15s ease;
            animation: ctaPulse 1.8s ease-in-out infinite, shimmer 3s linear infinite;
            min-height: 58px;
        }

        .spin-btn::before {
            content: '';
            position: absolute;
            top: 0;
            left: -75%;
            width: 50%;
            height: 100%;
            background: linear-gradient(120deg, transparent, rgba(255, 255, 255, .55), transparent);
            transform: skewX(-20deg);
            animation: sweep 2.6s ease-in-out infinite;
        }

        .spin-btn:hover {
            transform: translateY(-2px);
        }

        .spin-btn:active {
            transform: translateY(1px) scale(.98);
        }

        .spin-btn:disabled {
            background: #D1D5DB;
            color: #fff;
            cursor: not-allowed;
            animation: none;
            box-shadow: 0 4px 10px rgba(0, 0, 0, .15);
            opacity: .85;
        }

        .spin-btn:disabled::before {
            display: none;
        }

        /* ===== PROVA SOCIAL ===== */
        .social-card {
            background: rgba(255, 255, 255, .95);
            border-radius: 14px;
            padding: 10px 12px;
            display: flex;
            align-items: center;
            gap: 10px;
            box-shadow: 0 8px 22px -6px rgba(0, 0, 0, .18);
            opacity: 0;
            transform: translateY(10px);
            transition: opacity .4s ease, transform .4s ease;
        }

        .social-card.show {
            opacity: 1;
            transform: translateY(0);
        }

        .social-card img {
            width: 38px;
            height: 38px;
            border-radius: 50%;
            object-fit: cover;
            flex-shrink: 0;
        }

        .social-card .live-dot {
            width: 9px;
            height: 9px;
            background: #4ADE80;
            border-radius: 50%;
            margin-right: 6px;
            box-shadow: 0 0 0 0 rgba(74, 222, 128, .7);
            animation: livePulse 1.4s ease-out infinite;
            flex-shrink: 0;
        }

        .social-card p {
            font-size: 13px;
            color: var(--text);
            font-weight: 600;
            line-height: 1.3;
            margin: 0;
        }

        .social-card b {
            color: var(--shopee);
            font-weight: 800;
        }

        /* ===== POPUP / OVERLAY ===== */
        .overlay {
            position: fixed;
            inset: 0;
            background: rgba(0, 0, 0, .55);
            backdrop-filter: blur(4px);
            -webkit-backdrop-filter: blur(4px);
            display: none;
            align-items: center;
            justify-content: center;
            z-index: 100;
            padding: 20px;
            animation: fadeIn .3s ease;
        }

        .overlay.show {
            display: flex;
        }

        .popup {
            background: #fff;
            border-radius: 22px;
            padding: 28px 22px 22px;
            max-width: 360px;
            width: 100%;
            text-align: center;
            position: relative;
            animation: popIn .35s cubic-bezier(.16, 1, .3, 1);
            box-shadow: 0 25px 60px -10px rgba(0, 0, 0, .45);
        }

        .popup-emoji {
            font-size: 64px;
            line-height: 1;
            margin-bottom: 8px;
            display: inline-block;
            animation: bounce .8s ease-in-out infinite;
        }

        .popup-emoji img {
            width: 80px;
            height: 80px;
            display: inline-block;
        }

        .popup h2 {
            font-size: 26px;
            font-weight: 900;
            color: var(--text);
            margin-bottom: 8px;
        }

        .popup.win h2 {
            color: var(--shopee);
        }

        .popup p {
            font-size: 15px;
            color: var(--text-muted);
            line-height: 1.45;
            margin-bottom: 18px;
        }

        .popup p b.prize {
            display: inline-block;
            background: linear-gradient(90deg, #FFC93C, var(--gold-dark));
            color: #1F2937;
            font-weight: 900;
            padding: 4px 10px;
            border-radius: 999px;
            font-size: 18px;
            margin: 0 4px;
            box-shadow: 0 4px 10px rgba(245, 180, 0, .35);
            animation: prizePulse 1.3s ease-in-out infinite;
        }

        .popup p b.chance {
            color: var(--success);
            font-weight: 800;
            font-size: 16px;
        }

        .popup-btn {
            width: 100%;
            border: 0;
            background: linear-gradient(90deg, #FF6B35, var(--shopee));
            color: #fff;
            font-family: inherit;
            font-weight: 800;
            font-size: 17px;
            padding: 16px 18px;
            border-radius: 14px;
            cursor: pointer;
            box-shadow: 0 10px 22px -6px rgba(238, 77, 45, .45);
            transition: all .2s ease;
            min-height: 54px;
        }

        .popup-btn:hover {
            transform: translateY(-2px);
        }

        .popup-btn:active {
            transform: translateY(0);
        }

        .popup.win .popup-btn {
            background: linear-gradient(90deg, #FFC93C, var(--gold-dark));
            color: #1F2937;
            box-shadow: 0 10px 22px -6px rgba(245, 180, 0, .45);
        }

        /* ===== LOADING SCREEN ===== */
        .loading-screen {
            position: fixed;
            inset: 0;
            background: linear-gradient(165deg, #FF8533 0%, #EE4D2D 100%);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 200;
            transition: opacity .4s ease;
        }

        .loading-screen.hide {
            opacity: 0;
            pointer-events: none;
        }

        .spinner-loading {
            width: 50px;
            height: 50px;
            border: 5px solid rgba(255, 255, 255, .3);
            border-top-color: #fff;
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }

        /* ===== ANIMAÇÕES ===== */
        @keyframes glow {

            0%,
            100% {
                opacity: .65;
                transform: scale(1);
            }

            50% {
                opacity: 1;
                transform: scale(1.05);
            }
        }

        @keyframes ctaPulse {

            0%,
            100% {
                transform: scale(1);
            }

            50% {
                transform: scale(1.025);
            }
        }

        @keyframes shimmer {
            0% {
                background-position: 0% 50%;
            }

            100% {
                background-position: 200% 50%;
            }
        }

        @keyframes sweep {
            0% {
                left: -75%;
            }

            60%,
            100% {
                left: 130%;
            }
        }

        @keyframes livePulse {
            0% {
                box-shadow: 0 0 0 0 rgba(74, 222, 128, .7);
            }

            70% {
                box-shadow: 0 0 0 8px rgba(74, 222, 128, 0);
            }

            100% {
                box-shadow: 0 0 0 0 rgba(74, 222, 128, 0);
            }
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
            }

            to {
                opacity: 1;
            }
        }

        @keyframes popIn {
            from {
                opacity: 0;
                transform: scale(.85);
            }

            to {
                opacity: 1;
                transform: scale(1);
            }
        }

        @keyframes bounce {

            0%,
            100% {
                transform: translateY(0);
            }

            50% {
                transform: translateY(-8px);
            }
        }

        @keyframes prizePulse {

            0%,
            100% {
                transform: scale(1);
            }

            50% {
                transform: scale(1.06);
            }
        }

        @keyframes spin {
            from {
                transform: rotate(0deg);
            }

            to {
                transform: rotate(360deg);
            }
        }

        @media (prefers-reduced-motion: reduce) {

            *,
            *::before,
            *::after {
                animation-duration: .001ms !important;
                transition-duration: .001ms !important;
            }
        }
    </style>
</head>

<body>

    <!-- Loading -->
    <div id="loadingScreen" class="loading-screen hide">
        <div class="spinner-loading"></div>
    </div>

    <div class="wrap">

        <header class="header">
            <img src="images/brand-banner.3f2f57a3.png" alt="Shopee">
        </header>

        <h1 class="title">
            🎰 Gire a <span class="accent">Roleta</span><br>
            descubra seu <span class="accent">desconto!</span>
        </h1>

        <p class="subtitle">Você pode ganhar até <b>95% OFF</b> agora mesmo</p>

        <div class="roulette">
            <div class="pointer" aria-hidden="true">
                <svg viewBox="0 0 38 52" xmlns="http://www.w3.org/2000/svg">
                    <path d="M19 52 L1 16 Q1 1 19 1 Q37 1 37 16 Z" fill="#EE4D2D" stroke="#fff" stroke-width="3"
                        stroke-linejoin="round"></path>
                </svg>
            </div>
            <div class="roulette-disk" id="rouletteDisk">
                <img src="images/roleta.png" alt="Roleta de descontos">
            </div>
            <div class="roulette-center" aria-hidden="true">🎁</div>
        </div>

        <button class="spin-btn" id="spinBtn" type="button">
            <span>🎯</span>
            <span id="spinLabel">GIRAR AGORA</span>
        </button>

        <div class="social-card" id="socialCard">
            <span class="live-dot" aria-hidden="true"></span>
            <img src="images/man6.jpg" id="socialImg" alt="">
            <p id="socialText">João acabou de ganhar <b>75% de desconto</b>!</p>
        </div>

    </div>


    <!-- POPUP WIN -->
    <div class="overlay" id="popupWin" role="dialog" aria-modal="true" aria-labelledby="winTitle">
        <div class="popup win">
            <div class="popup-emoji">
                <img src="images/dinheioro.png" alt="">
            </div>
            <h2 id="winTitle">🎉 Você Ganhou!</h2>
            <p>
                <span style="color:#16A34A;font-weight:800;font-size:14px;letter-spacing:.5px">PRÊMIO
                    DESBLOQUEADO</span><br><br>
                Você acaba de garantir o <b class="prize">50% OFF</b><br>
                + <b style="color:#16A34A">Frete Grátis</b> em qualquer produto da Shopee Oficial!
                <br><br>
                <span style="font-size:14px;color:#9CA3AF">⏰ Resgate agora — seu cupom expira em minutos.</span>
            </p>
            <button class="popup-btn" id="winBtn" type="button">🛒 Resgatar Meu Cupom</button>
        </div>
    </div>

    <audio id="rouletteAudio" src="media/roleta.mp3" preload="none"></audio>

    <script>
        (function () {
            const $disk = document.getElementById('rouletteDisk');
            const $spinBtn = document.getElementById('spinBtn');
            const $spinLabel = document.getElementById('spinLabel');
            const $win = document.getElementById('popupWin');
            const $winBtn = document.getElementById('winBtn');
            const $audio = document.getElementById('rouletteAudio');
            const $loading = document.getElementById('loadingScreen');

            let spinning = false;
            const SPIN_DURATION = 5000;

            // === SPIN (sempre termina em vitória) ===
            function spin() {
                if (spinning) return;
                spinning = true;
                $spinBtn.disabled = true;
                $spinLabel.textContent = 'Girando...';

                try { $audio.currentTime = 0; $audio.play().catch(() => { }); } catch (e) { }

                $disk.classList.remove('spinning-win');
                // reflow para reiniciar a animação
                void $disk.offsetWidth;

                $disk.classList.add('spinning-win');
                setTimeout(() => {
                    try { $audio.pause(); } catch (e) { }
                    // Confete
                    if (typeof confetti === 'function') {
                        const burst = () => confetti({
                            particleCount: 120,
                            spread: 80,
                            origin: { y: 0.6 },
                            colors: ['#EE4D2D', '#FFC93C', '#FF6B35', '#FFFFFF', '#4ADE80']
                        });
                        burst();
                        setTimeout(burst, 400);
                        setTimeout(burst, 800);
                    }
                    $win.classList.add('show');
                    spinning = false;
                }, SPIN_DURATION + 500);
            }

            $spinBtn.addEventListener('click', spin);

            // === RESGATAR ===
            // Usamos location.replace (em vez de location.href) para SUBSTITUIR
            // a roleta no histórico — assim, quando o usuário clicar voltar na
            // /loja, não tem como cair de volta na roleta com o popup aberto.
            $winBtn.addEventListener('click', () => {
                const qs = window.location.search ? window.location.search : '';
                window.location.replace('../../loja/' + qs);
            });

            // === PROVA SOCIAL ===
            const $card = document.getElementById('socialCard');
            const $img = document.getElementById('socialImg');
            const $txt = document.getElementById('socialText');
            const descontos = [25, 50, 75, 85, 95];
            const pessoas = [
                ['Pedro Oliveira', 'https://i.postimg.cc/RhB8zCK5/24.jpg'],
                ['Ana Alves', 'https://i.postimg.cc/prw31XTF/2.jpg'],
                ['Fernanda Santos', 'https://i.postimg.cc/X7FvNr9t/3.jpg'],
                ['Bruno Souza', 'https://i.postimg.cc/2ynfYBgw/5.jpg'],
                ['Fabrício Costa', 'https://i.postimg.cc/kXrTRHtD/6.jpg'],
                ['Juliana Lima', 'https://i.postimg.cc/0ynPrDjX/4.jpg'],
                ['Yasmin Araújo', 'https://i.postimg.cc/9XNrx3BF/10.jpg'],
                ['Lucilene Silva', 'https://i.postimg.cc/x8Wj92sv/11.jpg'],
                ['Carla Ferreira', 'https://i.postimg.cc/qq8BBFWW/13.jpg'],
                ['Gabriela Vieira', 'https://i.postimg.cc/MT9bPss2/15.jpg'],
                ['Matheus Santos', 'https://i.postimg.cc/qvXNkN2j/20.jpg'],
                ['Daniel Ribeiro', 'https://i.postimg.cc/ZK0tcnb0/22.jpg']
            ];

            // Pré-carrega todas as fotos para evitar lag entre foto e nome
            pessoas.forEach(p => { const i = new Image(); i.src = p[1]; });

            let lastIndex = -1;
            function pickDifferent() {
                let idx;
                do { idx = Math.floor(Math.random() * pessoas.length); }
                while (idx === lastIndex && pessoas.length > 1);
                lastIndex = idx;
                return idx;
            }

            function rotateSocial() {
                const p = pessoas[pickDifferent()];
                const d = descontos[Math.floor(Math.random() * descontos.length)];
                const html = `${p[0]} acabou de ganhar <b>${d}% de desconto</b>!`;

                // Esconde antes do swap
                $card.classList.remove('show');

                // Pré-carrega a imagem e só mostra quando ela estiver pronta
                let applied = false;
                const apply = () => {
                    if (applied) return;
                    applied = true;
                    $img.src = p[1];
                    $txt.innerHTML = html;
                    requestAnimationFrame(() => $card.classList.add('show'));
                };
                const preload = new Image();
                preload.onload = apply;
                preload.onerror = apply;
                preload.src = p[1];
                // Se já estava em cache, onload pode não disparar — força check
                if (preload.complete) apply();
                // Fallback final se a rede travar
                setTimeout(apply, 800);
            }

            // Primeira aparição após 1s
            setTimeout(rotateSocial, 1000);
            setInterval(rotateSocial, 4500);

            // === LOADING ===
            window.addEventListener('load', () => {
                setTimeout(() => $loading.classList.add('hide'), 200);
            });
        })();
    </script>



</body>

</html>
