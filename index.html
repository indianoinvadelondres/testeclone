    <style>
        :root {
            --shopee-orange: #EE4D2D;
            --shopee-orange-dark: #D7401C;
            --shopee-orange-light: #FF6B35;
            --gold: #FFC93C;
            --gold-dark: #F5B400;
            --text-dark: #1F2937;
            --text-muted: #6B7280;
            --bg-card: #FFFFFF;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            -webkit-tap-highlight-color: transparent;
        }

        html,
        body {
            min-height: 100%;
            background: linear-gradient(160deg, #FF8533 0%, #EE4D2D 55%, #C9381C 100%);
        }

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            color: var(--text-dark);
            overflow-x: hidden;
            min-height: 100vh;
            padding: 16px 14px 28px;
            display: flex;
            justify-content: center;
        }

        body::before,
        body::after {
            content: '';
            position: fixed;
            border-radius: 50%;
            pointer-events: none;
            z-index: 0;
        }

        body::before {
            width: 280px;
            height: 280px;
            top: -90px;
            right: -90px;
            background: radial-gradient(circle, rgba(255, 201, 60, .35) 0%, transparent 70%);
        }

        body::after {
            width: 340px;
            height: 340px;
            bottom: -120px;
            left: -120px;
            background: radial-gradient(circle, rgba(255, 255, 255, .18) 0%, transparent 70%);
        }

        .container {
            position: relative;
            z-index: 1;
            width: 100%;
            max-width: 460px;
            display: flex;
            flex-direction: column;
            gap: 14px;
        }

        .header {
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 4px 0 0;
            opacity: 0;
            animation: fadeDown .55s ease .05s forwards;
        }

        .header-logo {
            height: clamp(70px, 18vw, 100px);
            width: auto;
            filter: drop-shadow(0 4px 14px rgba(0, 0, 0, .25));
        }

        .headline {
            text-align: center;
            color: #fff;
            font-weight: 900;
            font-size: clamp(28px, 8vw, 38px);
            line-height: 1.05;
            letter-spacing: -.5px;
            text-shadow: 0 3px 12px rgba(0, 0, 0, .2);
            opacity: 0;
            animation: fadeUp .6s ease .22s forwards;
        }

        .headline .accent {
            display: inline-block;
            background: linear-gradient(90deg, #FFE082, #FFC93C);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            -webkit-text-fill-color: transparent;
        }

        .subhead {
            text-align: center;
            color: #fff;
            font-weight: 600;
            font-size: clamp(14px, 3.8vw, 16px);
            line-height: 1.45;
            opacity: 0;
            animation: fadeUp .55s ease .3s forwards;
            padding: 0 4px;
        }

        .subhead b {
            color: #FFE082;
            font-weight: 800;
        }


        .cupom-card {
            background: var(--bg-card);
            border-radius: 22px;
            padding: 18px 16px 16px;
            position: relative;
            box-shadow: 0 20px 50px -10px rgba(0, 0, 0, .35);
            opacity: 0;
            transform: scale(.94);
            animation: popIn .5s cubic-bezier(.16, 1, .3, 1) .38s forwards;
            overflow: hidden;
        }

        .cupom-card::before {
            content: '';
            position: absolute;
            inset: 0;
            background:
                radial-gradient(circle at 0 50%, transparent 12px, #fff 12px),
                radial-gradient(circle at 100% 50%, transparent 12px, #fff 12px);
            background-size: 50% 100%;
            background-position: left center, right center;
            background-repeat: no-repeat;
            pointer-events: none;
        }

        .cupom-card>* {
            position: relative;
            z-index: 2;
        }

        .cupom-discount {
            text-align: center;
            font-size: 13px;
            color: var(--text-muted);
            font-weight: 600;
            margin-bottom: 4px;
        }

        .cupom-discount b {
            color: var(--shopee-orange);
            font-weight: 800;
        }

        .cupom-img-wrap {
            position: relative;
            display: flex;
            justify-content: center;
            align-items: center;
            margin: 4px 0 10px;
            min-height: 140px;
        }

        .cupom-glow {
            position: absolute;
            inset: -10% -5%;
            background: radial-gradient(ellipse at center, rgba(255, 201, 60, .55) 0%, transparent 65%);
            filter: blur(14px);
            animation: glowPulse 2.4s ease-in-out infinite;
            z-index: 1;
        }

        .cupom-img {
            position: relative;
            z-index: 2;
            width: 100%;
            max-width: 320px;
            height: auto;
            object-fit: contain;
            animation: floatY 3.2s ease-in-out infinite;
            filter: drop-shadow(0 12px 22px rgba(0, 0, 0, .18));
        }


        .timer-box {
            background: rgba(0, 0, 0, .35);
            backdrop-filter: blur(8px);
            -webkit-backdrop-filter: blur(8px);
            border: 1px solid rgba(255, 255, 255, .15);
            border-radius: 14px;
            padding: 10px 14px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            color: #fff;
            opacity: 0;
            animation: fadeUp .55s ease .55s forwards;
        }

        .timer-box .label {
            font-size: 13px;
            font-weight: 600;
            opacity: .92;
        }

        .timer-box .clock {
            font-variant-numeric: tabular-nums;
            font-weight: 800;
            font-size: 18px;
            color: #FFE082;
            background: rgba(0, 0, 0, .3);
            padding: 4px 10px;
            border-radius: 8px;
            letter-spacing: 1px;
        }

        .cta-wrapper {
            opacity: 0;
            animation: fadeUp .6s ease .68s forwards;
        }

        .cta {
            width: 100%;
            border: 0;
            background: linear-gradient(90deg, #FFC93C 0%, #FFB100 50%, #FFC93C 100%);
            background-size: 200% 100%;
            color: #1F2937;
            font-family: inherit;
            font-weight: 900;
            font-size: clamp(18px, 5vw, 22px);
            letter-spacing: .5px;
            text-transform: uppercase;
            padding: 18px 20px;
            border-radius: 18px;
            cursor: pointer;
            box-shadow:
                0 12px 28px rgba(0, 0, 0, .28),
                inset 0 -3px 0 rgba(0, 0, 0, .12),
                inset 0 2px 0 rgba(255, 255, 255, .4);
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            position: relative;
            overflow: hidden;
            transition: transform .15s ease, box-shadow .15s ease;
            animation: ctaPulse 1.8s ease-in-out infinite, shimmer 3s linear infinite;
            min-height: 56px;
        }

        .cta::before {
            content: '';
            position: absolute;
            top: 0;
            left: -75%;
            width: 50%;
            height: 100%;
            background: linear-gradient(120deg, transparent, rgba(255, 255, 255, .55), transparent);
            transform: skewX(-20deg);
            animation: sweep 2.6s ease-in-out infinite;
        }

        .cta:hover,
        .cta:focus-visible {
            transform: translateY(-2px);
            outline: none;
        }

        .cta:active {
            transform: translateY(1px) scale(.98);
            animation: none;
        }

        .cta .arrow {
            transition: transform .25s ease;
        }

        .cta:hover .arrow {
            transform: translateX(4px);
        }

        .cta-subtext {
            text-align: center;
            color: #fff;
            font-size: 12px;
            font-weight: 600;
            margin-top: 8px;
            opacity: .9;
        }

        @keyframes fadeUp {
            from {
                opacity: 0;
                transform: translateY(14px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        @keyframes fadeDown {
            from {
                opacity: 0;
                transform: translateY(-10px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        @keyframes popIn {
            from {
                opacity: 0;
                transform: scale(.94);
            }

            to {
                opacity: 1;
                transform: scale(1);
            }
        }

        @keyframes floatY {

            0%,
            100% {
                transform: translateY(0);
            }

            50% {
                transform: translateY(-6px);
            }
        }

        @keyframes glowPulse {

            0%,
            100% {
                opacity: .6;
                transform: scale(1);
            }

            50% {
                opacity: 1;
                transform: scale(1.06);
            }
        }

        @keyframes ctaPulse {

            0%,
            100% {
                transform: scale(1);
            }

            50% {
                transform: scale(1.025);
            }
        }

        @keyframes shimmer {
            0% {
                background-position: 0% 50%;
            }

            100% {
                background-position: 200% 50%;
            }
        }

        @keyframes sweep {
            0% {
                left: -75%;
            }

            60%,
            100% {
                left: 130%;
            }
        }

        @keyframes blink {

            0%,
            60%,
            100% {
                opacity: 1;
            }

            70%,
            90% {
                opacity: .35;
            }
        }

        @keyframes livePulse {
            0% {
                box-shadow: 0 0 0 0 rgba(74, 222, 128, .7);
            }

            70% {
                box-shadow: 0 0 0 10px rgba(74, 222, 128, 0);
            }

            100% {
                box-shadow: 0 0 0 0 rgba(74, 222, 128, 0);
            }
        }

        @media (min-width: 520px) {
            body {
                padding: 28px 20px;
            }

            .container {
                gap: 18px;
            }

            .cupom-card {
                padding: 22px 22px 20px;
            }
        }

        @media (prefers-reduced-motion: reduce) {

            *,
            *::before,
            *::after {
                animation-duration: .001ms !important;
                animation-iteration-count: 1 !important;
                transition-duration: .001ms !important;
            }

            .cta {
                animation: none;
            }
        }
    </style>
</head>

        <div class="timer-box" role="timer" aria-live="polite">

        <div class="cta-wrapper">
            <button class="cta" type="button" onclick="goToQuiz()" aria-label="Resgatar cupom agora">

                <span class="arrow" aria-hidden="true">→</span>
            </button>

    </div>

    <script>
        function goToQuiz() {
            const qs = window.location.search ? window.location.search.substring(1) : '';
            window.location.href = '../quiz/index.html' + (qs ? '?' + qs : '');
        }

        (function () {
            const el = document.getElementById('countdown');
            if (!el) return;
            const TOTAL = 14 * 60 + 59;
            let remaining = TOTAL;
            function render() {
                const m = Math.floor(remaining / 60);
                const s = remaining % 60;
                el.textContent = String(m).padStart(2, '0') + ':' + String(s).padStart(2, '0');
            }
            function tick() {
                remaining = remaining > 0 ? remaining - 1 : TOTAL;
                render();
            }
            render();
            setInterval(tick, 1000);
        })();

    </script>
